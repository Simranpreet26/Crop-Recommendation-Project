<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #56ab2f, #a8e063);
            text-align: center;
            color: white;
        }

        .container {
            background: white;
            color: black;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        h3 {
            color: green;
        }
    </style>
</head>

<body>

<h1>🌾 Crop Recommendation System</h1>

<div class="container">
    <form action="/predict" method="post">
        <input type="text" name="temperature" placeholder="Temperature"><br>
        <input type="text" name="humidity" placeholder="Humidity"><br>
        <input type="text" name="ph" placeholder="pH"><br>
        <input type="text" name="rainfall" placeholder="Rainfall"><br>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h3>Recommended Crop: {{ prediction }}</h3>
    {% endif %}
</div>

</body>
</html>
