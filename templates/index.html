<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation System</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                        url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
            background-size: cover;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        h1 {
            color: white;
        }

        h2 {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>🌾 Crop Recommendation System</h1>

<div class="box">
    <form action="/predict" method="post">
        <input type="text" name="temperature" placeholder="Temperature" required>
        <input type="text" name="humidity" placeholder="Humidity" required>
        <input type="text" name="ph" placeholder="pH" required>
        <input type="text" name="rainfall" placeholder="Rainfall" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h2>{{ emoji }} Recommended Crop:</h2>
        <h3 style="color: green;">{{ prediction }}</h3>
    {% endif %}
</div>

</body>
</html>
