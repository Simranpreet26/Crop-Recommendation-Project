<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation System</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #56ab2f, #a8e063);
            text-align: center;
            padding: 40px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 350px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            width: 95%;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: darkgreen;
        }

        h2 {
            color: white;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            color: darkgreen;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>🌱 Crop Recommendation System</h2>

    <div class="box">
        <form method="POST" action="/predict">
            <input type="text" name="temperature" placeholder="Temperature" required>
            <input type="text" name="humidity" placeholder="Humidity" required>
            <input type="text" name="ph" placeholder="pH" required>
            <input type="text" name="rainfall" placeholder="Rainfall" required>

            <button type="submit">Predict Crop</button>
        </form>

        {% if prediction %}
            <div class="result">
                Recommended Crop: {{ prediction }}
            </div>
        {% endif %}
    </div>

</body>
</html>
