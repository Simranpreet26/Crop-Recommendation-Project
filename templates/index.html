<!DOCTYPE html>
<html>
<head>
    <title>Smart Crop Recommendation</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                        url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
            background-size: cover;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 320px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: darkgreen;
            transform: scale(1.1);
        }

        h1 {
            color: white;
        }

        img {
            margin-top: 10px;
            border-radius: 10px;
        }

        .result {
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>

<body>

<h1>🌾 Smart Crop Recommendation System</h1>

<div class="box">
    <form action="/predict" method="post">
    <select name="city">
        <option value="punjab">Punjab</option>
        <option value="delhi">Delhi</option>
        <option value="mumbai">Mumbai</option>
    </select>

    <input type="text" name="temperature" placeholder="Temperature" required>
    <input type="text" name="humidity" placeholder="Humidity" required>
    <input type="text" name="ph" placeholder="pH" required>
    <input type="text" name="rainfall" placeholder="Rainfall" required>

    <button type="submit">Predict</button>
</form>

    {% if prediction %}
    <div class="result">
        <h2>{{ emoji }} Recommended Crop:</h2>
        <h3 style="color: green;">{{ prediction }}</h3>

        <img src="{{ image }}" width="250">

        <p><b>Model Accuracy:</b> {{ acc }}%</p>
    </div>
    {% endif %}
</div>

</body>
</html>
